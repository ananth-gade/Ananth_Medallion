# ************************** SqlDBM: Snowflake *************************
# *********** Generated from DDL: CORE Fact by conversion **************

version: 2
models:
  - name: FACT_EMPLOYEE_LIFECYCLE
    description: 'CORE.FACT_EMPLOYEE_LIFECYCLE

      Purpose: Transactional fact table capturing every significant lifecycle event
      for Republic Services employees. Events are detected by comparing successive
      SCD Type 2 versions from DIM_EMPLOYEE, producing one row per lifecycle event
      per employee.


      Business Context: Enables workforce analytics including headcount trending,
      attrition analysis, internal mobility tracking, tenure distribution, and
      organizational transfer patterns. Every metric resolves to a simple GROUP BY
      on this fact — no custom SQL required downstream.


      Key Relationships:

      - References DIM_EMPLOYEE via EMPLOYEE_SK (foreign key to surrogate key)

      - EMPLOYEE_EIN is carried as a degenerate dimension for convenience


      Data Lineage: Derived from CORE.DIM_EMPLOYEE (SCD Type 2 dimension),
      which sources from CDM.WORKFORCE.EMPLOYEE → ODS_WORKDAY_EMPLOYEE


      Event Types:

      - HIRE: First appearance of employee (version 1)

      - TERMINATION: Employee status changes to TERM

      - LOA: Employee placed on Leave of Absence

      - RETURN: Employee returns from LOA to active status

      - ROLE_CHANGE: Job code changes between versions

      - ORG_TRANSFER: Division number changes between versions

      - PROFILE_UPDATE: Any other attribute change detected by SCD2


      Primary Use Cases:

      - Monthly new hire count and attrition rate

      - Voluntary vs. involuntary turnover analysis

      - Average tenure at termination

      - Attrition by tenure band (<1yr, 1-3yr, 3-5yr, 5yr+)

      - Internal mobility and promotion rate

      - Cross-division transfer tracking

      - Supervisor change rate analysis

      - Time between lifecycle events'
    config:
      contract:
        enforced: false

    constraints:
      - type: primary_key
        columns:
          - LIFECYCLE_SK
        name: PK_FACT_EMPLOYEE_LIFECYCLE

    columns:
      - name: LIFECYCLE_SK
        data_type: varchar(32)
        description: SURROGATE KEY - MD5 HASH OF EMPLOYEE_EIN + EFF_DT - UNIQUE IDENTIFIER FOR EACH LIFECYCLE EVENT RECORD
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: EMPLOYEE_SK
        data_type: varchar(32)
        description: FOREIGN KEY TO DIM_EMPLOYEE - REFERENCES THE SPECIFIC SCD TYPE 2 VERSION OF THE EMPLOYEE RECORD ACTIVE AT THE TIME OF THE EVENT
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              to: ref('DIM_EMPLOYEE')
              field: EMPLOYEE_SK

      - name: EMPLOYEE_EIN
        data_type: varchar(15)
        description: DEGENERATE DIMENSION - EMPLOYEE IDENTIFICATION NUMBER CARRIED FOR QUERY CONVENIENCE WITHOUT REQUIRING A JOIN TO DIM_EMPLOYEE
        constraints:
          - type: not_null

      - name: EVENT_DATE
        data_type: date
        description: DATE THE LIFECYCLE EVENT OCCURRED - DERIVED FROM THE EFFECTIVE DATE (EFF_DT) OF THE DIM_EMPLOYEE SCD TYPE 2 VERSION
        constraints:
          - type: not_null

      - name: EVENT_TYPE
        data_type: varchar(20)
        description: CLASSIFICATION OF THE LIFECYCLE EVENT - DETERMINED BY COMPARING CURRENT AND PREVIOUS SCD2 VERSIONS (HIRE, TERMINATION, LOA, RETURN, ROLE_CHANGE, ORG_TRANSFER, PROFILE_UPDATE)
        constraints:
          - type: not_null
        tests:
          - accepted_values:
              values: ['HIRE', 'TERMINATION', 'LOA', 'RETURN', 'ROLE_CHANGE', 'ORG_TRANSFER', 'PROFILE_UPDATE']

      - name: EVENT_FISCAL_YEAR
        data_type: integer
        description: FISCAL YEAR DERIVED FROM EVENT_DATE - ENABLES TIME-BASED AGGREGATION OF LIFECYCLE EVENTS
        meta:
          derived_column: true

      - name: EVENT_QUARTER
        data_type: integer
        description: CALENDAR QUARTER (1-4) DERIVED FROM EVENT_DATE - SUPPORTS QUARTERLY WORKFORCE REPORTING
        meta:
          derived_column: true

      - name: EVENT_MONTH
        data_type: integer
        description: CALENDAR MONTH (1-12) DERIVED FROM EVENT_DATE - SUPPORTS MONTHLY WORKFORCE TRENDING
        meta:
          derived_column: true

      - name: TENURE_DAYS
        data_type: integer
        description: NUMBER OF DAYS BETWEEN EMPLOYEE HIRE DATE AND EVENT DATE - PRIMARY TENURE MEASURE
        meta:
          measure: true
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: TENURE_MONTHS
        data_type: number(10,1)
        description: TENURE IN MONTHS (TENURE_DAYS / 30.44) ROUNDED TO 1 DECIMAL - HUMAN-READABLE TENURE MEASURE
        meta:
          measure: true

      - name: TENURE_YEARS
        data_type: number(10,2)
        description: TENURE IN YEARS (TENURE_DAYS / 365.25) ROUNDED TO 2 DECIMALS - USED FOR AVG TENURE AT TERMINATION METRIC
        meta:
          measure: true

      - name: TENURE_BAND
        data_type: varchar(20)
        description: TENURE CLASSIFICATION BAND - CATEGORIZES EMPLOYEES INTO COHORTS FOR ATTRITION ANALYSIS (<1 year, 1-3 years, 3-5 years, 5+ years)
        meta:
          derived_column: true

      - name: DAYS_SINCE_LAST_EVENT
        data_type: integer
        description: NUMBER OF DAYS BETWEEN THIS EVENT AND THE PREVIOUS EVENT FOR THE SAME EMPLOYEE - MEASURES EVENT VELOCITY AND STABILITY
        meta:
          measure: true

      - name: IS_TERMINATION
        data_type: boolean
        description: FLAG INDICATING WHETHER THIS EVENT IS A TERMINATION EVENT - CONVENIENCE BOOLEAN FOR FILTERING
        meta:
          flag_column: true

      - name: IS_VOLUNTARY_TERM
        data_type: boolean
        description: FLAG INDICATING WHETHER THE TERMINATION WAS VOLUNTARY (RESIGNATION) OR INVOLUNTARY - NULL IF NOT A TERMINATION EVENT. REQUIRES ENRICHMENT FROM HR SOURCE WHEN AVAILABLE
        meta:
          flag_column: true

      - name: TERM_REASON_CODE
        data_type: varchar(20)
        description: TERMINATION REASON CODE FROM HR SYSTEM - NULL IF NOT A TERMINATION EVENT. REQUIRES ENRICHMENT FROM WORKDAY TERMINATION DATA WHEN AVAILABLE
        meta:
          enrichment_pending: true

      - name: TERM_REASON_DESC
        data_type: varchar(100)
        description: HUMAN-READABLE DESCRIPTION OF TERMINATION REASON - NULL IF NOT A TERMINATION EVENT
        meta:
          enrichment_pending: true

      - name: PREV_JOB_CODE
        data_type: varchar(9)
        description: JOB CODE FROM THE PREVIOUS SCD2 VERSION - NULL FOR HIRE EVENTS (FIRST VERSION). ENABLES ROLE CHANGE TRACKING AND CAREER PATH ANALYSIS

      - name: NEW_JOB_CODE
        data_type: varchar(9)
        description: CURRENT JOB CODE AT THE TIME OF THE EVENT - COMPARED WITH PREV_JOB_CODE TO DETECT ROLE_CHANGE EVENTS

      - name: IS_PROMOTION
        data_type: boolean
        description: FLAG INDICATING WHETHER THE ROLE CHANGE REPRESENTS A PROMOTION (NEW_JOB_CODE > PREV_JOB_CODE) - FALSE IF NOT A ROLE CHANGE
        meta:
          flag_column: true

      - name: IS_LATERAL
        data_type: boolean
        description: FLAG INDICATING WHETHER THE ROLE CHANGE IS A LATERAL MOVE (JOB CODE CHANGED BUT NOT UPWARD) - FALSE IF NOT A ROLE CHANGE
        meta:
          flag_column: true

      - name: PREV_DIVISION_NUMBER
        data_type: integer
        description: DIVISION NUMBER FROM THE PREVIOUS SCD2 VERSION - NULL FOR HIRE EVENTS. ENABLES CROSS-DIVISION TRANSFER ANALYSIS

      - name: NEW_DIVISION_NUMBER
        data_type: integer
        description: CURRENT DIVISION NUMBER AT THE TIME OF THE EVENT - COMPARED WITH PREV_DIVISION_NUMBER TO DETECT ORG_TRANSFER EVENTS

      - name: IS_DIVISION_CHANGE
        data_type: boolean
        description: FLAG INDICATING WHETHER THE EMPLOYEE TRANSFERRED BETWEEN DIVISIONS - TRUE WHEN PREV_DIVISION_NUMBER != NEW_DIVISION_NUMBER
        meta:
          flag_column: true

      - name: PREV_SUPERVISOR_EIN
        data_type: varchar(15)
        description: SUPERVISOR EIN FROM THE PREVIOUS SCD2 VERSION - NULL FOR HIRE EVENTS. ENABLES SUPERVISOR CHANGE RATE ANALYSIS

      - name: NEW_SUPERVISOR_EIN
        data_type: varchar(15)
        description: CURRENT SUPERVISOR EIN AT THE TIME OF THE EVENT - COMPARED WITH PREV_SUPERVISOR_EIN TO MEASURE REPORTING RELATIONSHIP STABILITY

      - name: IS_RECORD_DELETED
        data_type: boolean
        description: FLAG INDICATING WHETHER THE UNDERLYING DIM_EMPLOYEE RECORD HAS BEEN SOFT-DELETED - INHERITED FROM SOURCE DIMENSION FOR DOWNSTREAM FILTERING
        meta:
          flag_column: true

      - name: SOURCE_SYSTEM
        data_type: varchar(20)
        description: SOURCE SYSTEM CODE INHERITED FROM DIM_EMPLOYEE - IDENTIFIES ORIGIN OF UNDERLYING EMPLOYEE DATA (WORKDAY, LAWSON, ETC.)
        constraints:
          - type: not_null
        meta:
          audit_column: true

      - name: LOAD_TIMESTAMP
        data_type: timestamp_ntz(9)
        description: TIMESTAMP WHEN THIS FACT RECORD WAS CREATED IN THE CORE LAYER - REFRESHED ON EVERY FULL TABLE REBUILD. AUDIT TRAIL FOR DATA LINEAGE
        meta:
          audit_column: true

      - name: LOAD_BATCH_ID
        data_type: number(18,0)
        description: ETL BATCH IDENTIFIER - TRACKS THE DBT RUN THAT CREATED THIS RECORD (REFRESHED ON EVERY FULL TABLE REBUILD)
        meta:
          audit_column: true