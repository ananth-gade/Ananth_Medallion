  - name: SRC_CREATE_DTM
    data_type: timestamp_ntz
    description: Original creation timestamp from the source system indicating when the record was first established. Preserves business event timing from operational system. NULL when source system does not track creation timestamps.
    meta:
      audit_column: true
  - name: SRC_LAST_UPDATE_DTM
    data_type: timestamp_ntz
    description: Most recent update timestamp from source indicating the last modification to any attribute. Tracks source system change timing for CDC processing and incremental load identification. NULL when source system does not track update timestamps.
    meta:
      audit_column: true
  - name: SRC_ACTION_CD
    data_type: varchar(1)
    description: Source system operation code indicating the type of change. I for Insert (new record), U for Update (record changes), D for Delete (termination/removal). Drives downstream CDC logic and change propagation to Silver CDM layer.
    meta:
      audit_column: true
  - name: SRC_DEL_IND
    data_type: varchar(1)
    description: Soft delete indicator tracking logical deletion status. Y indicates record is logically deleted in source system, N indicates active record. Enables soft delete pattern without physical record removal, preserving audit history.
    meta:
      audit_column: true
  - name: SOURCE_SYSTEM
    data_type: varchar(50)
    description: Source system identifier indicating which operational system originated this record. Single value per ODS table since ODS tables are source-specific (unlike CDM which can be multi-source).
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: SOURCE_TABLE
    data_type: varchar(100)
    description: Name of the source table in the staging layer that feeds this ODS table. Provides explicit lineage tracking from raw ingestion through ODS transformation. Typically matches the staging table name pattern.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: ODS_INS_BATCH_ID
    data_type: number(38,0)
    description: ETL batch identifier when record was first loaded into ODS layer. Links to batch audit tables for pipeline run tracking and troubleshooting. Enables tracing data lineage from raw ingestion to ODS transformation.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: ODS_UPD_BATCH_ID
    data_type: number(38,0)
    description: ETL batch identifier when record was last updated in ODS layer. Tracks most recent transformation batch for change history and audit trails. Updated with each ETL run that processes changes to the record.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: ODS_INSERT_TIMESTAMP
    data_type: timestamp_ntz
    description: Timestamp when record was first loaded into ODS layer during ETL processing. Marks initial arrival in the operational data store, distinct from source system creation time (SRC_CREATE_DTM). Represents when data became available in the warehouse.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: ODS_UPDATE_TIMESTAMP
    data_type: timestamp_ntz
    description: Timestamp when record was last updated in ODS layer during ETL processing. Reflects most recent ODS transformation time, distinct from source system update time (SRC_LAST_UPDATE_DTM). Enables identification of recently processed records.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: STG_INSERT_TIMESTAMP
    data_type: timestamp_ntz
    description: Timestamp when record was first loaded into staging layer from source system. Tracks raw data arrival time before ODS transformation. Enables measurement of staging-to-ODS processing latency and supports data arrival monitoring.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: OPERATION_TYPE
    data_type: varchar(10)
    description: ETL operation type performed on this record during most recent ODS processing. Indicates whether record was newly inserted into ODS, updated from previous state, or marked for deletion. Enables operational monitoring and debugging ETL logic.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: DQ_STATUS
    data_type: varchar(20)
    description: Data quality classification status at ingestion layer indicating validation results. Categorizes records based on schema compliance, business rule validation, and completeness checks performed during ODS load.
    meta:
      audit_column: true
  - name: DQ_ERROR_CODE
    data_type: varchar(500)
    description: Standardized error code identifying specific validation failure or quality issue encountered during ODS processing. Enables categorization of data quality problems for systematic remediation and reporting.
    meta:
      audit_column: true
  - name: DQ_ERROR_MESSAGE
    data_type: varchar(500)
    description: Human-readable description of data quality issue providing context for troubleshooting and remediation. Includes specific column names, values, and validation rules that failed during ODS processing.
    meta:
      audit_column: true
  - name: HASH_CHANGE
    data_type: varchar
    description: MD5 OF CHANGE COLUMNS. Hash value calculated from business attribute columns (excluding keys and metadata) to detect changes between ETL runs. Enables efficient incremental processing by identifying modified records that require propagation to downstream CDM layer.
    constraints:
    - type: not_null
    meta:
      audit_column: true
  - name: HASH_FULL
    data_type: varchar
    description: MD5 OF ALL COLUMNS. Complete record fingerprint including all business attributes, keys, and metadata for full comparison and data integrity validation. Used for reconciliation, data validation, and detecting any unexpected changes across environments.
    constraints:
    - type: not_null
    meta:
      audit_column: true
