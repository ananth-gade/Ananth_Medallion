  - name: CDM_INS_BATCH_ID
    data_type: bigint
    description: ETL batch identifier when record was first created in CDM. Links to batch audit tables for ETL run tracking and troubleshooting. Enables tracing data lineage back to specific pipeline execution, identifying when records entered the CDM layer, and supporting incident investigation.
    meta:
      audit_column: true
  - name: CDM_UPD_BATCH_ID
    data_type: bigint
    description: ETL batch identifier when record was last modified in CDM. Tracks most recent update for change history and audit trails. Updated with each ETL run that detects changes to the record, enabling identification of which pipeline execution introduced specific data modifications.
    meta:
      audit_column: true
  - name: CDM_INSERT_TIMESTAMP
    data_type: timestamp_ntz(9)
    description: Timestamp when site was first loaded into CDM. Marks initial creation in the data warehouse for lifecycle tracking and temporal analysis. Represents when data became available in the canonical layer, not when business event occurred
    meta:
      audit_column: true
  - name: CDM_UPDATE_TIMESTAMP
    data_type: timestamp_ntz(9)
    description: Timestamp when site was last updated in CDM. Reflects most recent modification for change tracking and data freshness monitoring. Updated with each ETL cycle that detects changes, enabling identification of recently modified records and data staleness detection.
    meta:
      audit_column: true
  - name: OPERATION_TYPE
    data_type: varchar(10)
    description: ETL operation type performed on this record during most recent CDM processing cycle. Indicates whether record was newly inserted (INSERT), modified from previous state (UPDATE), or soft deleted (DELETE). Enables operational monitoring, debugging ETL logic, generating change data capture feeds for downstream consumers, and tracking record lifecycle events.
  - name: DQ_STATUS
    data_type: varchar(20)
    description: Data quality classification status at ingestion layer indicating validation results. Categorizes records based on schema compliance, business rule validation, and completeness checks performed during CDM load.
    meta:
      audit_column: true
  - name: DQ_ERROR_CODE
    data_type: varchar(50)
    description: Standardized error code identifying specific validation failure or quality issue encountered during CDM processing. Enables categorization of data quality problems for systematic remediation and reporting.
    meta:
      audit_column: true
  - name: DQ_ERROR_MESSAGE
    data_type: varchar(500)
    description: Human-readable description of data quality issue providing context for troubleshooting and remediation. Includes specific column names, values, and validation rules that failed during CDM processing.
    meta:
      audit_column: true
  - name: HASH_CHANGE
    data_type: varchar
    description: Hash value to detect changes in non-key business attributes (dbt_hash) for incremental load processing and change data capture. Compares current record state against previous state to identify modified records requiring updates in downstream systems.
    meta:
      audit_column: true
  - name: HASH_FULL
    data_type: varchar
    description: Hash value of complete record for full comparison and data integrity validation. Includes all columns (keys, business attributes, and metadata) to verify exact record state across environments and detect any data corruption or unexpected changes
    meta:
      audit_column: true