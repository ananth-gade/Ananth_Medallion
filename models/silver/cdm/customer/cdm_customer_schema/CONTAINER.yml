version: 2
models:
- name: CONTAINER
  description: 'CUSTOMER.CONTAINER

    Purpose: Individual container/equipment entity representing specific waste receptacles assigned to customer sites (dumpsters, roll-offs, carts, compactors).


    Business Context: Containers are the fundamental service unit for waste collection. Each container has size, type, pickup schedule, pricing, and disposal routing information. Critical for route management, asset tracking, and service billing.


    Key Relationships:


    Child of SITE (containers placed at service locations)

    Child of ACCOUNT (billed to account)

    Links to CORPORATE_HIERARCHY via REVENUE_DISTRIBUTION_CODE

    Data Lineage: Sourced from InfoPro ODS tables BIPAC (Billing Property Account Container) and BIPACC (Billing Property Account Container Configuration)


    Primary Use Cases:


    Service scheduling and routing

    Asset management and tracking

    Recurring charge billing

    Lift/pickup tracking

    Waste stream analysis

    Franchise vs. commercial classification

    Disposal site routing'
  config:
    contract:
      enforced: true
  columns:
  - name: CDM_CONTAINER_PK
    data_type: varchar(32)
    description: Surrogate primary key generated using MD5 hash of the composite business key.
    meta:
      natural_key: true
  - name: CONTAINER_COMPOSITE_KEY
    data_type: varchar
    description: Complete business identifier for this container, formed by concatenating all four key components with hyphens (Division-Account-Site-ContainerGroup, e.g., '0450-0123456-0001-01'). This serves as the primary natural key for the container and is used across all systems for container lookups, reporting, and cross-system references.
  - name: INFOPRO_DIVISION_NUMBER
    data_type: varchar(5)
    description: InfoPro division number (company code) that identifies which Republic Services operating division owns and services this container. This is the first component of the container's unique business key and ties the container to a specific geographic operating unit for routing, billing, and reporting purposes.
    meta:
      natural_key: true
  - name: ACCOUNT_NUMBER
    data_type: varchar(14)
    description: Customer account number that owns or receives service for this container. Links the container to the customer's billing account and service agreement. This is the second component of the container's unique business key.
    meta:
      natural_key: true
  - name: SITE_NUMBER
    data_type: varchar(5)
    description: Identifier for the physical service location (site) where this container is placed. The site represents a specific address or facility within the customer's account (e.g., a customer may have multiple warehouse locations, each with its own site number).
    meta:
      natural_key: true
  - name: CONTAINER_GROUP_NUMBER
    data_type: decimal(2,0)
    description: Sequential number that distinguishes different containers or container groupings at the same site. When a location has multiple service containers, this number differentiates them (e.g., a commercial plaza might have Container Group 01 for trash, 02 for recycling, 03 for cardboard).
    meta:
      natural_key: true
  - name: REVENUE_DISTRIBUTION_CODE
    data_type: varchar(2)
    description: Two-character internal financial code that controls how revenue from this container's services is allocated across different Republic business units, divisions, cost centers, or reporting segments.
  - name: SITE_COMPOSITE_KEY
    data_type: varchar(24)
    description: 'Foreign key reference to the parent SITE record where this container is deployed. Combines division, account, and site number (format: Division-Account-Site, e.g., ''0450-0123456-0001''). Used to link containers to their physical service locations for routing and site analysis.'
  - name: ACCOUNT_COMPOSITE_KEY
    data_type: varchar(24)
    description: 'Foreign key reference to the parent ACCOUNT (customer) record that owns this container. Combines division and account number (format: Division-Account, e.g., ''0450-0123456''). Used to roll up all containers and services for a customer''s billing and account management.'
  - name: CONTAINER_NAME
    data_type: varchar(30)
    description: Descriptive name of the container type, such as 'Front Load Dumpster' or 'Residential Cart'. Looked up from ODS.IFP.vw_BIPTB (TBTYPE = 'C') based on CONTAINER_CODE to provide labels in reports and customer-facing applications.
  - name: IS_ACTIVE
    data_type: int
    description: Indicates whether this container is currently in active service (TRUE) or has been closed/removed (FALSE). Determined by comparing the container's close date to today - if the close date is in the future or far future (9999-12-31), the container is considered active.
  - name: ORIGINAL_START_DATE
    data_type: datetime
    description: Date when the container service originally started or the container was first placed at the customer site. For most containers, this aligns with when service first began.
  - name: LAST_SERVICE_DATE
    data_type: date
    description: Date of the most recent pickup or service completed for this container. Tracks the last time the container was serviced, which may be a future scheduled service date for active containers.
  - name: REMOVAL_DATE
    data_type: date
    description: Date when the container was physically removed from the customer site. Typically populated only when a container is permanently taken away. Most active containers show 1700-01-01 (InfoPro's null date indicator) meaning the container has not been removed.
  - name: CLOSE_DATE
    data_type: datetime
    description: Date when the container service is scheduled to end or was officially closed. Active containers typically show far-future dates like 4000-12-31 or 9999-12-31 indicating indefinite service. Closed containers show actual historical close dates. Used in conjunction with current date to determine IS_ACTIVE flag.
  - name: RATE_RESTRICTION_DATE
    data_type: datetime
    description: Date when pricing restrictions or rate locks were applied to this container, preventing automatic rate increases. Stored as integer YYYYMMDD in source (0 indicates no restriction). Used to enforce contract terms that freeze pricing for specific periods.
  - name: DISPOSAL_RATE_RESTRICTION_DATE
    data_type: date
    description: Date when disposal fee restrictions or locks were applied to this container, preventing changes to landfill/disposal charges. Stored as integer YYYYMMDD in source (0 indicates no restriction). Separate from service rate restrictions to manage disposal costs independentl
  - name: NEXT_RECURRING_CHARGE_GENERATION_DATE
    data_type: date
    description: Scheduled date when the next recurring billing charge will be generated for this container's service. Drives automated billing cycles for subscription-based container services, advancing each billing period after invoices are created.
  - name: BILLED_TO_DATE
    data_type: date
    description: Last date through which recurring charges have been billed for this container. Tracks billing progress to prevent duplicate charges and identify containers with unbilled periods. Updated each time recurring billing processes run, advancing forward as invoices are generated.
  - name: SEASONAL_STOP_DATE
    data_type: datetime
    description: Date when seasonal service is scheduled to stop for this container. Used for seasonal customers (vacation homes, summer camps, etc.) where service pauses during off-season. Most containers show 1700-01-01 (not seasonal).
  - name: SEASONAL_RESTART_DATE
    data_type: datetime
    description: Date when seasonal service is scheduled to resume after the seasonal stop period. Paired with SEASONAL_STOP_DATE to define the inactive season window. Typically shows 1700-01-01 for non-seasonal containers.
  - name: IS_SEASONAL_REMOVE_ROUTE
    data_type: int
    description: Indicates whether to remove this container from route schedules during the seasonal stop period. When TRUE, drivers won't see this stop on their routes during off-season.
  - name: IS_SEASONAL_REMOVE_CONTAINER
    data_type: int
    description: Indicates whether to physically remove the container from the customer site during the seasonal stop period. When TRUE, the container is picked up and returned to inventory during off-season rather than left on-site. More common for rental equipment than owned assets.
  - name: IS_SEASONAL_RECURRING_CHARGE
    data_type: int
    description: Indicates whether recurring charges continue during the seasonal stop period. When FALSE, billing suspends during off-season; when TRUE, customer continues paying rental/service fees even while service is paused.
  - name: CONTAINER_TYPE
    data_type: varchar
    description: Two-character container type code, identical to CONTAINER_CODE. Common values include CA (Cart), RC (Recycle Cart), HP (Herbie/Toter), RO (Roll-Off), BB (Bulk Bin), FL (Front Load), YC (Yard Cart), PT (Portable Toilet), RL (Rear Load). References ODS.IFP.vw_BIPTB (TBTYPE = 'C').
  - name: CONTAINER_SIZE
    data_type: decimal(18,2)
    description: Physical capacity of the container measured in cubic yards (for dumpsters/roll-offs) or gallons (for carts).
  - name: CONTAINER_CATEGORY
    data_type: varchar
    description: 'Waste stream classification combining the division''s line of business with container type to categorize into specific service categories: Commercial Trash, Commercial Recycle, Residential Trash, Residential Recycle, Residential Yardwaste, or Industrial Temp.'
  - name: HAS_COMPACTOR
    data_type: int
    description: Indicates whether this container is equipped with a compaction unit that compresses waste to maximize capacity. Compactors are typically found on larger commercial/industrial containers, affect pickup frequency (less often due to compression), and require specialized service procedures and safety protocols.
  - name: IS_CONTAINER_OWNED
    data_type: int
    description: Indicates whether the container is owned by the company (TRUE) or belongs to the customer/third party (FALSE). When TRUE, the company owns the asset and is responsible for maintenance, replacement, and capital costs. When FALSE, the container is customer-owned or rented from third parties, limiting company liability for asset management.
  - name: CONTAINER_COUNT
    data_type: int
    description: 'Number of containers ordered for this service agreement. Represents the quantity contractually agreed upon, which may differ from containers physically onsite. Common pattern: containers ordered but not yet delivered or temporarily removed. Defaults to 0 when NULL to support arithmetic operations in downstream systems.'
  - name: CONTAINER_QUANTITY_ON_SITE
    data_type: int
    description: Physical count of containers at customer location.Service agreements may have zero containers onsite due to orders not yet delivered, containers removed for service, or seasonal patterns. Defaults to 0 when NULL to enable count summations and prevent null propagation in aggregations.
  - name: YARDAGE
    data_type: decimal(18,2)
    description: 'Average monthly yardage capacity calculated from service frequency and container size. Formula: (Total pickups / Pickups per period) * Container size * 52 weeks / 12 months. Returns 0 when pickups per period is 0 to prevent division errors. Used for operational capacity planning and environmental reporting of waste volumes.'
  - name: UNIT_OF_MEASURE
    data_type: char(3)
    description: Primary measurement unit for container capacity and waste volume. Most containers have blank/null value defaulting to '0'. Common values include TN (Ton for weight-based billing), YD (Yards for cubic yard capacity). Defaults to '0' when NULL to support downstream joins and lookups expecting non-null keys.
  - name: PRODUCT_DESCRIPTION
    data_type: varchar
    description: Detailed description of the container product or service type (e.g., 'WASTE HAND PICKUP 5-10 BAGS', 'RECYCLE CONTAINER 8 CU YD').
  - name: SHARED_CONTAINER_ID
    data_type: varchar
    description: Group identifier for containers shared across multiple customers or locations. Used to link containers in shared service scenarios (multi-tenant buildings, industrial parks).
  - name: IS_SHARED
    data_type: int
    description: Binary flag indicating whether a container is shared among multiple customers. When set to 1, the container services more than one account, with costs and usage typically allocated across the sharing parties. When 0, the container is dedicated to a single customer.
  - name: PICKUP_PERIOD_TOTAL_LIFTS
    data_type: decimal(3,0)
    description: The number of times a container is scheduled to be serviced (picked up or emptied) during each billing period. For example, a value of "2" means the container is lifted twice per week for weekly service.
  - name: PICKUP_PERIOD_LENGTH
    data_type: decimal(2,0)
    description: he frequency of the billing cycle for container service. This defines how often the customer is billed and indicates the service schedule pattern.
  - name: PICKUP_PERIOD_UNIT
    data_type: varchar(7)
    description: Time unit defining the pickup period length. Translates the InfoPro period unit code where 'W' indicates weekly-based schedules and converts to 'WEEK', while blank/null values (typically on-call containers) convert to 'UNKNOWN'. Works with PICKUP_PERIOD_LENGTH (ACPLTH) to determine service frequency - for example, ACPUNT='W' with ACPLTH=2 means 'every 2 weeks'.
  - name: PICKUP_SCHEDULE
    data_type: varchar(10)
    description: 'Formatted pickup frequency description based on the period length value (ACPLTH) which represents the number of weeks between pickups when ACPUNT=''W''. Common patterns: 1=''WEEKLY'' (most common), 2=''EOW'' (Every Other Week), 4=''MONTHLY'' (every 4 weeks), 0=''ON CALL'' (no fixed schedule), 52=''OTHER'' (annual), with any non-standard intervals also categorized as ''OTHER''.'
  - name: LIFT_SCHEDULE_DESCRIPTION
    data_type: varchar
    description: Summary of the container pickup frequency combining the number of lifts with the service interval (e.g., '2 Every Week' for twice-weekly service, '1 Every 2 Weeks' for bi-weekly service, or 'OnCall' for on-demand pickups). The format automatically adjusts for singular/plural periods and handles annual and non-scheduled containers.
    # quote: "CASE WHEN ACOCAL = 'Y' THEN 'OnCall' WHEN ACTOTL = 0 OR ACPLTH = 0 THEN 'None' WHEN ACPLTH = 52 THEN CAST(ACTOTL AS VARCHAR) \u01C0\u01C0 ' Per Year' WHEN ACPLTH = 1 THEN CAST(ACTOTL AS VARCHAR) \u01C0\u01C0 ' Every Week' WHEN ACPLTH = 4 THEN CAST(ACTOTL AS VARCHAR) \u01C0\u01C0 ' Per Month' ELSE CAST(ACTOTL AS VARCHAR) \u01C0\u01C0 ' Every ' \u01C0\u01C0 CAST(ACPLTH AS VARCHAR) \u01C0\u01C0 ' Weeks' END"
  - name: IS_ONCALL
    data_type: int
    description: Indicator if container is on-call service (1/0)
  - name: MINIMUM_NUMBER_OF_LIFTS
    data_type: decimal
    description: Minimum number of service pickups guaranteed per billing period. Duplicate of MINIMUM_LIFTS field with identical source (ACMINL). Both fields exist for legacy compatibility with different downstream systems and reporting tools.
  - name: MONDAY_LIFT_DAY
    data_type: int
    description: 'Number of scheduled pickups/lifts for Monday (0-999). Indicates how many times the container is scheduled to be serviced on Mondays within the service frequency pattern. A value of 0 means no Monday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_MONDAY_REQUIRED to determine service scheduling flexibility. Example: A value of 2 means two pickups are scheduled for Mondays.'
  - name: TUESDAY_LIFT_DAY
    data_type: int
    description: 'Number of scheduled pickups/lifts for Tuesday (0-999). Indicates how many times the container is scheduled to be serviced on Tuesdays within the service frequency pattern. A value of 0 means no Tuesday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_TUESDAY_REQUIRED to determine service scheduling flexibility. Example: A value of 1 means one pickup is scheduled for Tuesdays.'
  - name: WEDNESDAY_LIFT_DAY
    data_type: int
    description: Number of scheduled pickups/lifts for Wednesday (0-999). Indicates how many times the container is scheduled to be serviced on Wednesdays within the service frequency pattern. A value of 0 means no Wednesday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_WEDNESDAY_REQUIRED to determine service scheduling flexibility.
  - name: THURSDAY_LIFT_DAY
    data_type: int
    description: Number of scheduled pickups/lifts for Thursday (0-999). Indicates how many times the container is scheduled to be serviced on Thursdays within the service frequency pattern. A value of 0 means no Thursday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_THURSDAY_REQUIRED to determine service scheduling flexibility.
  - name: FRIDAY_LIFT_DAY
    data_type: int
    description: Number of scheduled pickups/lifts for Friday (0-999). Indicates how many times the container is scheduled to be serviced on Fridays within the service frequency pattern. A value of 0 means no Friday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_FRIDAY_REQUIRED to determine service scheduling flexibility.
  - name: SATURDAY_LIFT_DAY
    data_type: int
    description: Number of scheduled pickups/lifts for Saturday (0-999). Indicates how many times the container is scheduled to be serviced on Saturdays within the service frequency pattern. A value of 0 means no Saturday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_SATURDAY_REQUIRED to determine service scheduling flexibility.
  - name: SUNDAY_LIFT_DAY
    data_type: int
    description: Number of scheduled pickups/lifts for Sunday (0-999). Indicates how many times the container is scheduled to be serviced on Sundays within the service frequency pattern. A value of 0 means no Sunday pickups are scheduled, while values 1-999 represent the number of lifts. Works in conjunction with IS_SUNDAY_REQUIRED to determine service scheduling flexibility.
  - name: IS_MONDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Monday service is mandatory (Y/N). When set to 'Y', the system enforces that MONDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Monday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Monday routes are disrupted. Required flag validation ensures service commitment integrity.
  - name: IS_TUESDAY_REQUIRED
    data_type: int
    description: 'Flag indicating whether Tuesday service is mandatory (Y/N). When set to ''Y'', the system enforces that TUESDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to ''N'', Tuesday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. Example: IS_TUESDAY_REQUIRED = ''N'' with TUESDAY_LIFT_DAY = 2 means two pickups are scheduled but service can be moved to other days if needed.'
  - name: IS_WEDNESDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Wednesday service is mandatory (Y/N). When set to 'Y', the system enforces that WEDNESDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Wednesday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Wednesday routes are disrupted. Required flag validation ensures service commitment integrity.
  - name: IS_THURSDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Thursday service is mandatory (Y/N). When set to 'Y', the system enforces that THURSDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Thursday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Thursday routes are disrupted. Required flag validation ensures service commitment integrity.
  - name: IS_FRIDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Friday service is mandatory (Y/N). When set to 'Y', the system enforces that FRIDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Friday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Friday routes are disrupted.
  - name: IS_SATURDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Saturday service is mandatory (Y/N). When set to 'Y', the system enforces that SATURDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Saturday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Saturday routes are disrupted.
  - name: IS_SUNDAY_REQUIRED
    data_type: int
    description: Flag indicating whether Sunday service is mandatory (Y/N). When set to 'Y', the system enforces that SUNDAY_LIFT_DAY must have a value greater than 0 (at least one pickup must be scheduled). When set to 'N', Sunday pickups are optional and can be scheduled (value > 0) or not scheduled (value = 0) based on operational flexibility. This allows service to shift to other days if Sunday routes are disrupted.
  - name: CONTRACT_GROUP_NUMBER
    data_type: decimal(2,0)
    description: Numeric identifier grouping multiple related service contracts under a single billing or service agreement. Value 0 represents containers with no contract grouping , while groups 1-99 organize contracts with shared terms.
  - name: MUNICIPAL_FRANCHISE_CONTRACT
    data_type: varchar
    description: Municipal franchise contract code or identifier assigned to the container's service location. Contains franchise fee codes (e.g., "15FRF" for 15% franchise fee, "07ERF" for environmental recovery fee), municipal contract identifiers (e.g., "MURPH", "BROOKD", "GIANT"), city-specific codes (e.g., "CARROLLTON", "LEWISVILLE"), or numeric contract references.
  - name: MUNICIPAL_CONTRACT_GROUP_NAME
    data_type: varchar(30)
    description: 'Descriptive name identifying the purpose or contract terms for grouped services. Examples: "8% FRF" (8% franchise fee group), "9% FRF" (9% franchise fee), "CITY OF SOMERSET CO-FS" (municipal free service), "DALLAS RECYCLE-NO FEE" (recycling program), "INTERNAL USE ONLY" (company operations). Provides human-readable labels for contract groupings in customer service screens and reports.'
  - name: MUNICIPAL_CONTRACT_TYPE
    data_type: varchar(10)
    description: Classification of the municipal contract arrangement type. Primary values include "OM" (Open Market - standard commercial contracts) and "MUNI" (Municipal - government/city service contracts). Indicates whether the container service operates under open market franchise agreements or direct municipal service contracts, affecting billing, franchise fee application, and regulatory compliance requirements.
  - name: GRID_NUMBER
    data_type: varchar(6)
    description: Geographic identifier designating the service area or territory grid where the container is located. Republic divides operating regions into grids for route optimization, service planning, and operational reporting. Alphanumeric codes (e.g., 'F45TEN', 'I65LNI', 'GCHANG', '176ELJ') uniquely identify service zones, helping dispatchers quickly determine which crews and routes handle a particular container.
  - name: ACCOUNT_TYPE
    data_type: char(1)
    description: lassifies the account service arrangement. P=Permanent ongoing service (standard residential/commercial), S=Seasonal service (parks/campgrounds with seasonal operations), T=Temporary limited-duration service (construction/events), X=Exchange service (container swaps), E=Equipment accounts, C=Compactor service, A=Alternative service arrangement, I=Internal company use, B=Bulk service, L=Leased equipment. Defaults to 'P' if blank
  - name: RECURRING_CHARGE_FREQUENCY
    data_type: int
    description: Specifies how many times per year recurring container rental fees are billed. Value 12=monthly invoicing, 4=quarterly, 6=semi-annual, 1=annual, with values 3/2/0/365 for special billing arrangements. Controls the billing cycle frequency for ongoing equipment rental charges, directly impacting cash flow timing and customer invoice schedules.
  - name: RECURRING_MONTHS_ADV_BILL
    data_type: int
    description: Number of months customer prepays for container rental fees. Value 0=billing in arrears after service, 1=one month advance prepayment, 2=two months advance. Combined with RECURRING_CHARGE_FREQUENCY to determine invoice timing (e.g., if frequency=12 and advance=1, customer pays monthly bills one month ahead).
  - name: SERVICE_MONTHS_ADV_BILL
    data_type: int
    description: Number of months customer prepays for pickup/disposal service fees. Separate from rental advance billing; controls whether service charges are collected upfront or after services rendered. Value 0=bill in arrears, 1=one month advance. Field is essentially unused in practice but retained for potential future prepayment programs.
  - name: RATE_TYPE
    data_type: char(1)
    description: Pricing methodology applied to the container service. R=Regular standard rates (published rate tables), O=Other special pricing, T=Temporary short-term rates, S=Special negotiated rates, A=Alternate rate structure, P=Permanent rate lock, W=Waived or promotional rates, plus additional specialized rate codes. Blank indicates default rate processing. Drives which rate table is used for invoice calculation and revenue recognition.
  - name: STOP_CODE
    data_type: char(1)
    description: Service status indicator controlling whether pickups continue and billing remains active. C=Current/Continue service (normal active service), R=Removed/Relocated, Y=Yard stop customer request, W=Weather/Winter suspension, E=Equipment issue, X=Exchange, G=General stop, I=Inactive, D=Disposal-related stop, M=Moved, plus additional stop reason codes. Blank indicates no stop.
  - name: DISTRICT_CODE
    data_type: int
    description: Operational district identifier for the service area where the container is located. Numeric codes organize containers into operational districts for management reporting, resource allocation, and performance tracking. May align with or differ from RESIDENTIAL_DISTRICT depending on service type (commercial vs residential) and operational structure.
  - name: IS_DISPOSAL_BILLABLE
    data_type: int
    description: "Controls whether landfill/disposal fees are passed through to the customer or absorbed by the company. Converts 'Y' to 1 (billable\u2014customer pays disposal as separate line item) and all other values to 0 (disposal costs included in service price or absorbed). Critical for invoice line item generation and cost recovery."
  - name: IS_STD_DISPOSAL_BILLABLE
    data_type: int
    description: Determines whether standard published disposal rates apply or if negotiated/contract-specific disposal pricing is used. Converts 'Y' to 1 (standard rate tables apply) and all other values to 0 (special contractual rates or negotiated disposal fees). Works in conjunction with IS_DISPOSAL_BILLABLE to control disposal pricing structure.
  - name: DISPOSAL_CODE
    data_type: varchar(2)
    description: Landfill or disposal facility identifier where container contents are taken. Tracks the specific disposal site receiving the waste for regulatory compliance, cost allocation, and facility capacity planning. Direct mapping preserves the 2-character facility code used across InfoPro systems.
  - name: DISPOSAL_PRICE_CODE
    data_type: varchar(2)
    description: Pricing lookup code used to retrieve disposal rates from pricing tables (BIPLP, BIPCCR). Different codes represent different disposal fee structures based on waste type (MSW, C&D, recyclables), contract terms, or facility.
  - name: DISPOSAL_SITE_NAME
    data_type: varchar
    description: Name of the landfill or disposal facility. Derived by looking up the disposal price code (ACLFPC) in Code_LOV reference table where CODE_TYPE_CD='LFP'. Provides customer-facing facility names for invoices and reporting instead of cryptic codes.ANDFILL SITE
  - name: DISPOSAL_RATE_PER_UNIT
    data_type: decimal(11,4)
    description: Base disposal rate charged per unit of waste delivered to landfill or transfer station. Applied to tonnage (typically dollars per ton) or cubic yardage to calculate disposal fees before adjustments. NULL values default to 0 for calculations, combined with disposal adjustment fields for final pricing.
  - name: DISPOSAL_ADJUSTMENT_VALUE
    data_type: decimal(11,4)
    description: Percentage or amount used to adjust standard disposal rates. Works with DISPOSAL_ADJUSTMENT_CODE to determine if value represents percentage discount/surcharge or flat amount. NULL values default to 0 to prevent calculation errors in billing, allowing optional pricing modifications without breaking rate calculations.
  - name: DISPOSAL_DOLLAR_ADJUSTMENT
    data_type: decimal(11,4)
    description: Fixed dollar amount added to or subtracted from disposal charges. Applies flat-rate pricing adjustments regardless of tonnage or volume. Used for negotiated discounts, surcharges, or special pricing arrangements that don't vary by quantity. NULL values default to 0 to enable optional adjustments without requiring values for every container.
  - name: DISPOSAL_ADJUSTMENT_CODE
    data_type: char(1)
    description: "Controls how disposal adjustments are calculated\u2014specifies whether DISPOSAL_ADJUSTMENT_VALUE represents a flat dollar amount, percentage, or other calculation method. Determines the mathematical operation for applying disposal pricing modifications to base rates. NULL values default to '0' (no adjustment) to handle containers without special pricing."
  - name: DISPOSAL_COST_PER_REVENUE_CODE
    data_type: char(1)
    description: Indicates whether disposal represents a cost the company pays to disposal facility or revenue the company receives. Controls cost/revenue accounting classification for disposal transactions. 'C' means company incurs disposal expense; 'R' means disposal generates revenue (e.g., inbound waste acceptance fees at company-owned facilities); '0' means not applicable. NULL values default to '0
  - name: DISPOSAL_TAX_APPLICATION_CODE
    data_type: char(1)
    description: Controls how sales tax and other taxes are applied to disposal charges. Determines tax treatment for disposal fees based on jurisdiction, waste type, or contract terms. Different codes represent different tax application rules (taxable, exempt, or special rates). NULL values default to '0' (standard tax treatment). Used with TAX_APPLICATION_CODE in RATE table for invoice tax calculation
  - name: EXCESS_TON_AMOUNT
    data_type: decimal(18,5)
    description: Per-ton charge applied when waste tonnage exceeds contractual limits or estimates. Penalizes over-contract usage by charging additional fees for excess disposal beyond agreed tonnage allocations. Values like 5.00, 10.00, or 99999.99 represent penalty rates. Most containers show 0.00 (no excess tonnage penalty). Direct mapping preserves the contractual overage charge rate.
  - name: WASTE_STREAM_DESCRIPTION
    data_type: varchar
    description: 'Classifies the type of waste stream handled by the container into categories: Solid Waste (permanent and secondary waste), Recycle (temporary and recyclable materials), Other, Yard Waste, and Organics. Determines routing, disposal facility selection, and regulatory reporting requirements.'
  - name: SPECIAL_HANDLING_CODE
    data_type: varchar(5)
    description: Code indicating special handling requirements for the container (hazardous materials, medical waste, special pickup procedures, access restrictions). Controls operational instructions for drivers and affects routing and safety protocols.
  - name: COMMODITY_CODE
    data_type: varchar
    description: Identifies the type of waste material collected in the container (e.g., general waste, recyclables, organic waste). Used for regulatory reporting and service classification.
  - name: FRANCHISE_FLAG
    data_type: varchar
    description: Indicates whether the container operates under a franchise agreement or in open market. If the Open Market/Franchise flag is set = 'F' then this is TRUE for franchise, otherwise if it's set to 'O' for Open Market it is FALSE. Also considers container-level franchise override
  - name: MUNICIPAL_FLAG
    data_type: varchar
    description: Indicates whether the container serves a municipal or government customer. Identifies containers providing waste/recycling service to municipalities, government agencies, or public entities.
  - name: IS_PURCHASE_ORDER_REQUIRED
    data_type: int
    description: Boolean indicator if purchase order is required for service billing. When TRUE, customer must provide PO before invoicing; when FALSE, can bill without PO documentation. NULL values default to FALSE.
  - name: RECEIPT_REQUIRED_CODE
    data_type: char(1)
    description: 'Single-character code indicating the type of receipt or proof of service documentation required for this container. Code values include: N=NO RECEIPT NEEDED, Y=RECEIPT REQUIRED, S=SIGNED RECEIPT REQUIRED, W=WEIGHT TICKET REQUIRED, M=MANIFEST REQUIRED, P=PURCHASE ORDER, C=CASH ON DELIVERY, D=DEPOSIT ON DELIVERY, L=COMPANY RECEIPT REQUIRED, V=VOLUME SERVICE REQUIRED, plus location-specific codes. Used to ensure proper verification and compliance at service point. Lookup descriptions available in ODS.IFP.vw_CUPTB WHERE TBTBLN=''RRQ'' (Receipt Requirements).'
  - name: RECEIPT_REQUIRED_DESCRIPTION
    data_type: varchar
    description: description of the receipt requirement type, translating the receipt code into meaningful text such as 'NO RECEIPT NEEDED', 'RECEIPT REQUIRED', 'SIGNED RECEIPT REQUIRED', 'WEIGHT TICKET REQUIRED', 'MANIFEST REQUIRED', or 'PURCHASE ORDER'. Provides clear documentation of service verification requirements for drivers, customer service representatives, and billing operations. E
  - name: HAS_CONTAINER_NOTES
    data_type: int
    description: Boolean indicator showing whether the container has special handling notes, service instructions, or operational comments attached. When true, indicates that drivers or service personnel should review additional documentation or special instructions before servicing this container. Supports communication of location-specific requirements such as access codes, gate instructions, safety considerations, preferred service times, or customer-specific handling procedures. Critical for ensuring service quality and avoiding operational issues at the service location.
  - name: ASSET_PROFILE_NUMBER
    data_type: int
    description: CDH AssetProfile Primary Key. Unique identifier from the CDH (Customer Data Hub) system linking the container to its master asset profile record. Provides cross-reference to detailed asset attributes, maintenance history, lifecycle management information, and physical characteristics stored in the enterprise asset management system.
  - name: CONTAINER_SFDC_NUMBER
    data_type: varchar(50)
    description: Salesforce system relationship key linking the container to its corresponding record in the Salesforce CRM platform. Enables integration between operational container data and customer relationship management, supporting sales workflows, service case management, account planning, and customer engagement activities.
  - name: AVERAGE_WEIGHT
    data_type: decimal
    description: Typical or expected weight of container contents based on historical service data, calculated from actual pickup weights over time. Used for route planning optimization, vehicle capacity management, tonnage forecasting, and revenue estimation. Helps operations teams understand load requirements, predict disposal volumes, and plan appropriate equipment assignments.
  - name: CITY_ACCOUNT_NUMBER
    data_type: varchar
    description: Municipality or city-assigned account identifier used for municipal billing, franchise agreement tracking, and regulatory reporting. Commonly used for municipal contracts where the city or governing authority requires specific account numbering for reconciliation, audit compliance, and governmental accounting purposes. Examples include service level agreement codes, franchise area identifiers, municipal customer numbers, and city-specific tracking codes.
  - name: REMOTE_MONITOR_FLAG
    data_type: varchar
    description: Boolean indicator showing whether the container is equipped with remote monitoring technology such as sensors for fill level detection, GPS tracking, temperature monitoring, or telemetry devices. When true, indicates that container status can be monitored remotely to optimize collection schedules, reduce unnecessary service trips, and improve route efficiency.
  - name: MARKET_DESCRIPTION
    data_type: varchar
    description: 'description of the business market vertical or customer segment where the container operates. Translates the market vertical code into descriptive text from the vw_CUPTB lookup table (TBTBLN=''MVT''). Possible values include: ''Municipal'', ''Resi Subscription'', ''Small Container'', ''Large Container'', ''Construction'', ''Manufacturing'', ''National Accounts'', ''Manufacturing (National Acct)''.'
  - name: MARKET_VERTICAL_INDICATOR
    data_type: varchar(2)
    description: 'Single-character code identifying the primary business market vertical or customer segment classification for the account associated with this container. Code values verified in vw_CUPTB lookup table (TBTBLN=''MVT''): A=''Manufacturing (National Acct)'', C=''Construction'', F=''Municipal'', L=''Large Container'', M=''Manufacturing'', N=''National Accounts'', O=''Resi Subscription'', S=''Small Container''. Used for market segmentation analysis, revenue reporting by vertical, sales territory planning, and strategic business intelligence. Enables targeted marketing campaigns, pricing strategies, and service offerings tailored to specific industry segments. Lookup descriptions available in ODS.IFP.vw_CUPTB WHERE TBTBLN=''MVT'
  - name: GL_DIVISION_NUMBER
    data_type: varchar
    description: General Ledger division number from the corporate organizational hierarchy, representing the business unit or operating division responsible for this container's financial activity.
  - name: SUMMARY_ROUTING_FLAG
    data_type: varchar
    description: Boolean indicator controlling whether this container should be included in summary-level routing optimization rather than individual stop-level planning. When true, indicates that the container participates in consolidated routing where multiple services are grouped together for efficiency
  - name: DIGITAL_COMMUNICATIONS_FLAG
    data_type: varchar
    description: Boolean indicator showing whether this container is eligible to be linked or associated with other containers for combined service delivery, consolidated billing, or operational grouping. When true, allows the container to participate in service linking programs that improve operational efficiency by coordinating multiple container services.
  - name: DIGITAL_COMMUNICATIONS_CODE
    data_type: varchar
    description: Boolean indicator designating whether this container requires individual account-level handling and billing treatment rather than being part of a master account or consolidated billing arrangement. When true, indicates that the container should be managed as a standalone account with separate invoicing, service agreements, and customer communications.
  - name: INDIVIDUAL_ACCOUNT_FLAG
    data_type: varchar
    description: Flag indicating if each container requires a separate invoice instead of consolidated billing on a master account.
  - name: INDIVIDUAL_INVOICES_REQUIRED_FLAG
    data_type: varchar
    description: Code indicating the billing method for the container (e.g., direct, master account, third-party).
  - name: ASSOCIATION_CODE
    data_type: varchar(255)
    description: Numeric identifier for HOA, condo association, or property management entity managing the service.
  - name: ASSOCIATION_DESC
    data_type: varchar(60)
    description: 'Name of the HOA, condo association, or property management entity. Examples: "TIMBER CREEK HOME OWNERS", "STONEMILL CONDOMINIUM ASSOC", "OAK CREST MOBILE HOME PARK".'
  - name: ASSOCIATION_TYPE
    data_type: varchar(10)
    description: 'Type of association. Values: "HOA" (60,922 records) for homeowner/condo associations; blank (891,317 records) for non-association accounts.'
  - name: CORPORATE_HIERARCHY_COMPOSITE_KEY
    data_type: varchar(50)
    description: BUSINESS KEY COMBINING DIVISION, LOB, AND REVENUE DISTRIBUTION CODE
  - name: SOURCE_SYSTEM
    data_type: varchar
    description: 'Comma-separated list of all source systems contributing data to this CDM container record. Documents complete data lineage at business system level, enabling multi-source integration tracking and change data capture routing to appropriate operational platforms. Standard values: ''IFP'' (InfoPro core site data), ''CDH'' (Customer Data Hub MDM enrichment), ''OFC'' (Oracle Fusion Cloud).'
  - name: SOURCE_TABLES
    data_type: varchar
    description: Comma-separated list of all ODS source tables contributing data to this CDM container record. Documents complete data lineage at table level, enabling impact analysis when source schemas change and supporting data quality investigations by identifying all upstream dependencies.
  - name: PRIMARY_DATA_SOURCE
    data_type: varchar
    description: Identifies the primary InfoPro source table that owns the authoritative container master data. When multiple source tables contribute attributes to a container record, this field designates which table serves as the system of record for core container identity
  - name: ODS_IFP_BIPAC_PK
    data_type: varchar(32)
    description: The primary key from the ODS_IFP_BIPAC (Container Master) table that uniquely identifies each container record in the InfoPro source system.
  - name: ODS_IFP_BIPACC_PK
    data_type: varchar(32)
    description: The surrogate primary key from the ODS_IFP_BIPACC (Container Group Account) table that uniquely identifies each container-to-account relationship in the InfoPro source system.
  - name: ODS_IFP_BIPTB_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_BIPTB table. Links to container type lookup record. NULL if container type not found. Used for source reconciliation and troubleshooting type classification data quality issues.
  - name: ODS_IFP_BIPCG_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_BIPCG table. Links to container group record. NULL if container has no BIPCG record. Used for source reconciliation and troubleshooting group data quality issues.
  - name: ODS_IFP_BIPCM_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_BIPCM table. Links to container municipality record. NULL if container has no BIPCM record. Used for source reconciliation and troubleshooting municipal data quality issues.
  - name: ODS_IFP_CUPASSACCT_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_CUPASSACCT table. Links to container pass account record. NULL if container has no association. Used for source reconciliation and troubleshooting association data quality issues.
  - name: ODS_IFP_CUPASSCODE_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_CUPASSCODE table. Links to container pass code record. NULL if container has no pass code. Used for source reconciliation and troubleshooting pass code data quality issues.
  - name: ODS_IFP_CUPTB_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_IFP_CUPTB table. Links to lookup table record for receipt requirements. NULL if receipt requirement not found. Used for source reconciliation and troubleshooting lookup data quality issues.
  - name: ODS_CDH_ASSETPROFILE_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_CDH_ASSETPROFILE table. Links to asset profile record. NULL if asset profile has no record. Used for source reconciliation and troubleshooting asset data quality issues.
  - name: ODS_CDH_ASSETPROFILE_SYSTEM_RELATIONSHIP_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_CDH_ASSETPROFILE_SYSTEM_RELATIONSHIP table. Links to asset-system relationship record. NULL if asset has no system relationship. Used for source reconciliation and troubleshooting multi-source asset data quality issues.
  - name: ODS_CDH_SYSTEM_PK
    data_type: varchar(32)
    description: ODS primary key reference from ODS_CDH_SYSTEM table. Links to system master record (Infopro, Salesforce). NULL if system not found. Used for source reconciliation and tracking system ownership.
