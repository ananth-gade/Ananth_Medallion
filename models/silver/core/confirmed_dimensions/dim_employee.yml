# ************************** SqlDBM: Snowflake *************************
# *********** Generated from DDL: CORE Dimension by conversion **********

version: 2
models:
  - name: DIM_EMPLOYEE
    description: 'CORE.DIM_EMPLOYEE

      Purpose: Employee dimension table containing workforce master data with organizational relationships, employment details, and system access profiles. Supports slowly changing dimension (Type 2) for tracking historical employee attributes.


      Business Context: Central dimension for all Republic Services employees with hire dates, positions, reporting relationships, job classifications, and supervisory hierarchies. Enables workforce analytics, sales territory management, organizational reporting, and role-based access control across the enterprise data warehouse.


      Key Relationships:

      - Referenced by fact tables via EMPLOYEE_SK (surrogate key)

      - Self-referential for reporting relationships via SUPERVISOR column

      - References DIVISION dimension via DIV_SK


      Data Lineage: Sourced from HR systems (Workday/Lawson), Kronos time tracking, InfoPro billing system


      Primary Use Cases:

      - Employee lifecycle and workforce analytics

      - Organizational hierarchy and reporting structure analysis

      - Sales territory and representative assignment

      - Commission and compensation reporting

      - Access control and security profile management

      - Historical employee attribute tracking (SCD Type 2)'
    config:
      contract:
        enforced: false

    constraints:
      - type: primary_key
        columns:
          - EMPLOYEE_SK
        name: PK_DIM_EMPLOYEE
      - type: unique
        columns:
          - EMPLOYEE_EIN
        name: DIM_EMPLOYEE_AK

    columns:
      - name: EMPLOYEE_SK
        data_type: varchar(32)
        description: SURROGATE KEY - MD5 HASH OF EMPLOYEE_EIN + TIMESTAMP (NATURAL KEY + EFFECTIVE TIMESTAMP) - UNIQUE IDENTIFIER FOR EACH EMPLOYEE RECORD VERSION (SCD TYPE 2)
        constraints:
          - type: not_null
      - name: EMPLOYEE_EIN
        data_type: varchar(15)
        description: EMPLOYEE IDENTIFICATION NUMBER - PRIMARY BUSINESS KEY (NATURAL KEY)
        constraints:
          - type: not_null
        meta:
          natural_key: true
      - name: DIV_SK
        data_type: integer
        description: DIVISION SURROGATE KEY - FOREIGN KEY REFERENCE TO DIVISION DIMENSION TABLE
      - name: ES_USER_ID
        data_type: integer
        description: User ID from ES system for referential integrity. Join ODS_ES_EQAI_USERS based on USER_CODE = NETWORK_USER_ID to retrieve User_ID.
      - name: SUPERVISOR
        data_type: varchar(15)
        description: SUPERVISOR EMPLOYEE EIN - REFERENCES EMPLOYEE_EIN FOR DIRECT REPORTING RELATIONSHIP
      - name: LAST_NAME
        data_type: varchar(50)
        description: EMPLOYEE LAST NAME
      - name: FIRST_NAME
        data_type: varchar(50)
        description: EMPLOYEE FIRST NAME
      - name: MIDDLE_INITIAL
        data_type: varchar(1)
        description: EMPLOYEE MIDDLE INITIAL
      - name: MIDDLE_NAME
        data_type: varchar(15)
        description: EMPLOYEE MIDDLE NAME
      - name: COMPLETE_NAME
        data_type: varchar(110)
        description: 'FULL NAME - FORMATTED CONCATENATION OF FIRST, MIDDLE, AND LAST NAME'
      - name: NICK_NAME
        data_type: varchar(40)
        description: PREFERRED NAME OR NICKNAME
      - name: JOB_CD
        data_type: varchar(9)
        description: JOB CODE - HR CLASSIFICATION CODE FROM POSITION MANAGEMENT SYSTEM
      - name: JOB_DESC
        data_type: varchar(60)
        description: JOB TITLE OR POSITION DESCRIPTION
      - name: EMP_POSITION_CD
        data_type: varchar(12)
        description: POSITION CODE - UNIQUE POSITION IDENTIFIER WITHIN ORGANIZATIONAL STRUCTURE
      - name: NETWORK_USER_ID
        data_type: varchar(40)
        description: ACTIVE DIRECTORY/NETWORK LOGIN USERNAME - USED FOR SYSTEM ACCESS AND AUTHENTICATION
      - name: EMAIL_ADDR
        data_type: varchar(60)
        description: CORPORATE EMAIL ADDRESS
      - name: HIRE_DT
        data_type: date
        description: ORIGINAL HIRE DATE - FIRST DATE OF EMPLOYMENT WITH REPUBLIC SERVICES
      - name: TERM_DT
        data_type: date
        description: TERMINATION DATE - EMPLOYMENT SEPARATION DATE (NULL IF ACTIVE)
      - name: ADJUSTED_HIRE_DT
        data_type: date
        description: ADJUSTED HIRE DATE - ACCOUNTS FOR BREAKS IN SERVICE, REHIRES, OR ACQUISITIONS
      - name: EMP_STATUS
        data_type: varchar(5)
        description: EMPLOYMENT STATUS CODE (ACTIVE, TERM, LOA, RETIRED)
      - name: EMP_UNION_CD
        data_type: varchar(10)
        description: UNION CODE - IDENTIFIES UNION AFFILIATION IF EMPLOYEE IS UNION MEMBER
      - name: EMP_PHONE_NBR
        data_type: varchar(15)
        description: EMPLOYEE PRIMARY PHONE NUMBER
      - name: EMP_FAX_NBR
        data_type: varchar(15)
        description: EMPLOYEE FAX NUMBER
      - name: EMP_WORK_PHONE_NBR
        data_type: varchar(10)
        description: EMPLOYEE WORK PHONE NUMBER (OFFICE EXTENSION)
      - name: EMP_CELLPHONE_NBR
        data_type: varchar(10)
        description: EMPLOYEE MOBILE/CELL PHONE NUMBER
      - name: ADDR_LINE_1
        data_type: varchar(30)
        description: PRIMARY STREET ADDRESS LINE 1
      - name: ADDR_LINE_2
        data_type: varchar(30)
        description: SECONDARY ADDRESS LINE 2 (APT, SUITE, UNIT)
      - name: CITY
        data_type: varchar(20)
        description: CITY NAME
      - name: STATE
        data_type: varchar(2)
        description: STATE CODE - US POSTAL ABBREVIATION
      - name: POSTAL_CD
        data_type: varchar(10)
        description: ZIP CODE OR POSTAL CODE
      - name: EMP_TYP
        data_type: varchar(1)
        description: EMPLOYEE TYPE CODE (F=FULL-TIME, P=PART-TIME, C=CONTRACT, T=TEMPORARY)
      - name: HR_PROFILE
        data_type: varchar(255)
        description: HR SYSTEM ACCESS PROFILE - LAWSON HR SECURITY ROLE
      - name: LAWSON_PROFILE
        data_type: varchar(10)
        description: LAWSON FINANCIAL SYSTEM ACCESS PROFILE CODE
      - name: KRONOS_PROFILE
        data_type: varchar(10)
        description: KRONOS TIME AND ATTENDANCE SYSTEM ACCESS PROFILE
      - name: INFOPRO_PROFILE
        data_type: varchar(10)
        description: INFOPRO BILLING SYSTEM ACCESS PROFILE
      - name: REGION_CONTROLLER
        data_type: varchar(15)
        description: REGION CONTROLLER EMPLOYEE EIN - REGIONAL FINANCE LEADER
      - name: ASSISTANT_CONTROLLER
        data_type: varchar(15)
        description: ASSISTANT CONTROLLER EMPLOYEE EIN - SUPPORTS REGIONAL CONTROLLER
      - name: REGION_FINANCE_MGR
        data_type: varchar(15)
        description: REGION FINANCE MANAGER EMPLOYEE EIN
      - name: AREA_CONTROLLER
        data_type: varchar(15)
        description: AREA CONTROLLER EMPLOYEE EIN - AREA-LEVEL FINANCE LEADER
      - name: ASST_AREA_CONTROLLER
        data_type: varchar(15)
        description: ASSISTANT AREA CONTROLLER EMPLOYEE EIN
      - name: AREA_SALES_MGR
        data_type: varchar(15)
        description: AREA SALES MANAGER EMPLOYEE EIN
      - name: DIV_CONTROLLER
        data_type: varchar(15)
        description: DIVISION CONTROLLER EMPLOYEE EIN - DIVISION-LEVEL FINANCE LEADER
      - name: DIV_GENERAL_MGR
        data_type: varchar(15)
        description: DIVISION GENERAL MANAGER EMPLOYEE EIN
      - name: DIV_SALES_MGR
        data_type: varchar(15)
        description: DIVISION SALES MANAGER EMPLOYEE EIN
      - name: EMP_INDIRECT_REPORTS_TO
        data_type: varchar(15)
        description: INDIRECT REPORTS TO EMPLOYEE EIN - DOTTED-LINE OR MATRIX REPORTING RELATIONSHIP
      - name: EMP_JOB_FAMILY_GRP
        data_type: varchar(60)
        description: JOB FAMILY GROUP - HIGH-LEVEL JOB CLASSIFICATION (OPERATIONS, FINANCE, SALES, IT, ETC.)
      - name: EMP_JOB_FAMILY
        data_type: varchar(60)
        description: JOB FAMILY - DETAILED JOB FAMILY CLASSIFICATION WITHIN GROUP
      - name: HRPARTNEREIN
        data_type: varchar(15)
        description: HR PARTNER EMPLOYEE EIN - ASSIGNED HR BUSINESS PARTNER FOR THIS EMPLOYEE
      - name: EFF_DT
        data_type: date
        description: EFFECTIVE DATE - START DATE FOR THIS VERSION OF THE EMPLOYEE RECORD (SCD TYPE 2)
        meta:
          scd_column: true
      - name: DISC_DT
        data_type: date
        description: DISCONTINUED DATE - END DATE FOR THIS VERSION OF EMPLOYEE RECORD, NULL IF CURRENT (SCD TYPE 2)
        meta:
          scd_column: true
      - name: IS_CURRENT
        data_type: boolean
        description: IS CURRENT FLAG - TRUE IF THIS IS THE CURRENT/ACTIVE VERSION OF EMPLOYEE RECORD (SCD TYPE 2)
        meta:
          scd_column: true
      - name: INS_BATCH_ID
        data_type: number(18,0)
        description: ETL INSERT BATCH IDENTIFIER - TRACKS WHEN RECORD WAS FIRST CREATED IN DIMENSION TABLE
        meta:
          audit_column: true
      - name: UPD_BATCH_ID
        data_type: number(18,0)
        description: ETL UPDATE BATCH IDENTIFIER - TRACKS WHEN RECORD WAS LAST MODIFIED IN DIMENSION TABLE
        meta:
          audit_column: true
      - name: IS_DELETED
        data_type: boolean
        description: IS DELETED FLAG - TRUE IF EMPLOYEE RECORD HAS BEEN DELETED/PURGED FROM SOURCE SYSTEM
        meta:
          audit_column: true
      - name: SOURCE_SYSTEM
        data_type: varchar(20)
        description: SOURCE SYSTEM CODE IDENTIFYING ORIGIN OF EMPLOYEE DATA (WORKDAY, LAWSON, ETC.)
        constraints:
          - type: not_null
        meta:
          audit_column: true
      - name: PRIMARY_DATA_SOURCE
        data_type: varchar(50)
        description: PRIMARY AUTHORITATIVE SOURCE TABLE FOR EMPLOYEE DATA - IDENTIFIES SYSTEM OF RECORD (E.G., ODS_WORKDAY_EMPLOYEE)
        meta:
          audit_column: true
      - name: CDM_INSERT_TIMESTAMP
        data_type: timestamp_ntz(9)
        description: CDM LAYER INSERT TIMESTAMP - TRACKS WHEN EMPLOYEE RECORD FIRST ENTERED CDM LAYER, ENABLING DATA LINEAGE AND LIFECYCLE TRACKING
        meta:
          audit_column: true
      - name: CDM_UPDATE_TIMESTAMP
        data_type: timestamp_ntz(9)
        description: CDM LAYER UPDATE TIMESTAMP - TRACKS LAST MODIFICATION IN CDM LAYER FOR INCREMENTAL LOAD LOGIC AND CHANGE DETECTION
        meta:
          audit_column: true
      - name: DBT_HASH
        data_type: varchar(32)
        description: MD5 HASH OF COMPLETE RECORD - VALIDATES FULL RECORD INTEGRITY FOR RECONCILIATION ACROSS ENVIRONMENTS AND CHANGE DATA CAPTURE
        meta:
          audit_column: true